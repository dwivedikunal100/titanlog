name: titanlog
description: "TitanLog — High-performance fitness tracking"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Database
  drift: ^2.15.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.23
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # UI
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  fl_chart: ^0.69.2
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  image_picker: ^1.1.2
  camera: ^0.11.2+1
  google_mlkit_pose_detection: ^0.14.1
  google_mlkit_selfie_segmentation: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.15.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  custom_lint:
  flutter_launcher_icons: ^0.13.1
  riverpod_lint: ^2.3.10

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
